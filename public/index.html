<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Better LinkedIn Search - AI-Powered People Discovery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/static/css/style.css?v=5">
</head>
<body class="bg-gray-50 min-h-screen font-sans antialiased">

  <!-- Hero with Search -->
  <header class="hero-gradient">
    <div class="max-w-6xl mx-auto px-4 pt-10 pb-12">
      <div class="flex items-center gap-3 mb-1">
        <svg class="w-8 h-8 text-white/90" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128H9m6 0a5.972 5.972 0 0 0-.786-3.07M9 19.128v-.003c0-1.113.285-2.16.786-3.07M9 19.128H3.375a4.125 4.125 0 0 1-3.247-6.588M6.375 13.5a9.337 9.337 0 0 1 4.121.952M15 19.128a5.972 5.972 0 0 1-3-3.07m0 0a5.972 5.972 0 0 0-3 3.07M12 16.058V12m0 0V7.5m0 4.5h4.5m-4.5 0H7.5" />
        </svg>
        <h1 class="text-3xl font-extrabold text-white tracking-tight">Better LinkedIn Search</h1>
      </div>
      <p class="text-indigo-100 text-base ml-11 tracking-wide">Find the right people using natural language, powered by AI</p>

      <div class="search-card mt-8">
        <form id="search-form" class="flex flex-col sm:flex-row gap-3">
          <input
            type="text"
            id="query-input"
            class="flex-1 rounded-xl border-0 shadow-sm focus:ring-2 focus:ring-indigo-400 text-base p-4 bg-white/80 backdrop-blur placeholder-gray-400"
            placeholder='e.g. "Product managers in Vietnam with AI experience who have published AI apps"'
            autocomplete="off"
          >
          <button
            type="submit"
            id="search-btn"
            class="btn-primary px-8 py-4 rounded-xl font-semibold text-base disabled:opacity-50 disabled:cursor-not-allowed"
          >
            Search
          </button>
        </form>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8">

    <!-- Search History -->
    <div id="history-panel" class="card mb-6">
      <h3 class="text-lg font-semibold text-gray-900 mb-3">Recent Searches</h3>
      <div id="history-list" class="space-y-2">
        <p class="text-sm text-gray-400">Loading...</p>
      </div>
    </div>

    <!-- Parsed Criteria Panel -->
    <div id="criteria-panel" class="hidden bg-indigo-50 border border-indigo-200 rounded-xl p-5 mb-6">
      <h3 class="text-sm font-semibold text-indigo-800 mb-3">AI parsed your query as:</h3>
      <div id="criteria-content" class="space-y-2"></div>
    </div>

    <!-- Progress Panel -->
    <div id="progress-panel" class="hidden mb-6">
      <div class="card">
        <div class="flex items-center gap-3 mb-3">
          <div id="spinner" class="spinner"></div>
          <span id="progress-text" class="text-sm text-gray-600">Starting search...</span>
        </div>
        <div id="progress-log" class="text-xs text-gray-400 space-y-1 max-h-32 overflow-y-auto"></div>
      </div>
    </div>

    <!-- Error Panel -->
    <div id="error-panel" class="hidden mb-6">
      <div class="bg-red-50 border border-red-200 rounded-xl p-4">
        <p id="error-text" class="text-sm text-red-700"></p>
      </div>
    </div>

    <!-- Results Section -->
    <div id="results-panel" class="hidden">
      <div class="flex justify-between items-center mb-4">
        <h2 id="results-count" class="text-lg font-semibold text-gray-900"></h2>
        <div class="flex items-center gap-2">
          <button id="share-btn" class="btn-share hidden" onclick="copyShareLink()">
            <svg class="w-4 h-4 inline -mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
            </svg>
            Copy Link
          </button>
          <button id="export-btn" class="btn-export">Download CSV</button>
        </div>
      </div>

      <div class="card overflow-hidden !p-0">
        <table class="w-full text-sm">
          <thead class="bg-gray-50/80 border-b">
            <tr>
              <th class="px-4 py-3 text-left font-medium text-gray-600 w-12">#</th>
              <th class="px-4 py-3 text-left font-medium text-gray-600">Name</th>
              <th class="px-4 py-3 text-left font-medium text-gray-600">Title / Company</th>
              <th class="px-4 py-3 text-left font-medium text-gray-600">Location</th>
              <th class="px-4 py-3 text-left font-medium text-gray-600 w-16 sortable" data-sort="overall">Score</th>
              <th id="dim-1-header" class="px-4 py-3 text-left font-medium text-gray-600 w-16 sortable" data-sort="dim1"></th>
              <th id="dim-2-header" class="px-4 py-3 text-left font-medium text-gray-600 w-16 sortable" data-sort="dim2"></th>
              <th id="dim-3-header" class="px-4 py-3 text-left font-medium text-gray-600 w-16 sortable" data-sort="dim3"></th>
              <th class="px-4 py-3 text-left font-medium text-gray-600">Match Summary</th>
            </tr>
          </thead>
          <tbody id="results-body" class="divide-y divide-gray-100"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="/static/js/app.js?v=5"></script>
</body>
</html>
