<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedIn Helper - AI-Powered People Search</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">
  <!-- Header -->
  <header class="bg-white shadow-sm border-b">
    <div class="max-w-6xl mx-auto px-4 py-5">
      <h1 class="text-2xl font-bold text-gray-900">LinkedIn Helper</h1>
      <p class="text-sm text-gray-500 mt-1">Search for people using natural language, powered by AI</p>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8">
    <!-- Search Section -->
    <div class="bg-white rounded-lg shadow p-6 mb-6">
      <form id="search-form" class="flex gap-3">
        <input
          type="text"
          id="query-input"
          class="flex-1 rounded-lg border border-gray-300 shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-base p-4"
          placeholder='e.g. "Product managers in Vietnam with AI experience who have published AI apps"'
          autocomplete="off"
        >
        <button
          type="submit"
          id="search-btn"
          class="bg-blue-600 text-white px-8 py-4 rounded-lg hover:bg-blue-700 font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
        >
          Search
        </button>
      </form>
    </div>

    <!-- Search History -->
    <div id="history-panel" class="bg-white rounded-lg shadow p-6 mb-6">
      <h3 class="text-lg font-semibold text-gray-900 mb-3">Recent Searches</h3>
      <div id="history-list" class="space-y-2">
        <p class="text-sm text-gray-400">Loading...</p>
      </div>
    </div>

    <!-- Parsed Criteria Panel -->
    <div id="criteria-panel" class="hidden bg-blue-50 border border-blue-200 rounded-lg p-4 mb-6">
      <h3 class="text-sm font-semibold text-blue-800 mb-2">AI parsed your query as:</h3>
      <div id="criteria-content" class="text-sm text-blue-700 space-y-1"></div>
    </div>

    <!-- Progress Panel -->
    <div id="progress-panel" class="hidden mb-6">
      <div class="bg-white rounded-lg shadow p-4">
        <div class="flex items-center gap-3 mb-3">
          <div id="spinner" class="animate-spin h-5 w-5 border-2 border-blue-600 border-t-transparent rounded-full"></div>
          <span id="progress-text" class="text-sm text-gray-600">Starting search...</span>
        </div>
        <div id="progress-log" class="text-xs text-gray-400 space-y-1 max-h-32 overflow-y-auto"></div>
      </div>
    </div>

    <!-- Error Panel -->
    <div id="error-panel" class="hidden mb-6">
      <div class="bg-red-50 border border-red-200 rounded-lg p-4">
        <p id="error-text" class="text-sm text-red-700"></p>
      </div>
    </div>

    <!-- Results Section -->
    <div id="results-panel" class="hidden">
      <div class="flex justify-between items-center mb-4">
        <h2 id="results-count" class="text-lg font-semibold text-gray-900"></h2>
        <button
          id="export-btn"
          class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 text-sm font-medium transition-colors"
        >
          Download CSV
        </button>
      </div>

      <div class="bg-white rounded-lg shadow overflow-hidden">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 border-b">
            <tr>
              <th class="px-4 py-3 text-left font-medium text-gray-600 w-12">#</th>
              <th class="px-4 py-3 text-left font-medium text-gray-600">Name</th>
              <th class="px-4 py-3 text-left font-medium text-gray-600">Title / Company</th>
              <th class="px-4 py-3 text-left font-medium text-gray-600">Location</th>
              <th class="px-4 py-3 text-left font-medium text-gray-600 w-16 sortable" data-sort="overall">Score</th>
              <th id="dim-1-header" class="px-4 py-3 text-left font-medium text-gray-600 w-16 sortable" data-sort="dim1"></th>
              <th id="dim-2-header" class="px-4 py-3 text-left font-medium text-gray-600 w-16 sortable" data-sort="dim2"></th>
              <th id="dim-3-header" class="px-4 py-3 text-left font-medium text-gray-600 w-16 sortable" data-sort="dim3"></th>
              <th class="px-4 py-3 text-left font-medium text-gray-600">Match Summary</th>
            </tr>
          </thead>
          <tbody id="results-body" class="divide-y divide-gray-100"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="/static/js/app.js?v=2"></script>
</body>
</html>
